name: Build and Test Roam Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=https://nixos.org/channels/nixpkgs-unstable
        
    - name: Update flake.lock (if needed)
      run: |
        nix flake update
        
    - name: Build package
      run: nix build .#roam --print-build-logs
        
    - name: Run tests
      run: |
        chmod +x ./test.sh
        ./test.sh
        
    - name: Test binary execution
      run: |
        timeout 10s ./result/bin/roam --version || echo "Binary started successfully (timeout expected for GUI app)"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v5
      with:
        name: roam-package
        path: result/
        retention-days: 30